<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <title>App Kids - Aprende Jugando</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar (items generados dinámicamente desde menu-config.js) -->
      <nav class="sidebar">
        <div class="sidebar-header">
          <!-- Mascota gato animada -->
          <div class="cat-mascot" id="cat-mascot">
            <div class="cat-body">
              <div class="cat-ears">
                <div class="cat-ear left"></div>
                <div class="cat-ear right"></div>
              </div>
              <div class="cat-face">
                <div class="cat-eyes">
                  <div class="cat-eye left"><div class="cat-pupil"></div></div>
                  <div class="cat-eye right"><div class="cat-pupil"></div></div>
                </div>
                <div class="cat-nose"></div>
                <div class="cat-mouth"></div>
                <div class="cat-whiskers">
                  <span></span><span></span><span></span> <span></span><span></span><span></span>
                </div>
              </div>
              <div class="cat-tail"></div>
            </div>
          </div>
          <div class="sidebar-title">
            <span class="sidebar-title-main">App Kids</span>
            <span class="sidebar-title-sub">¡Aprende Jugando!</span>
          </div>
          <!-- Burbuja de diálogo del gato -->
          <div class="cat-bubble" id="cat-bubble">¡Elige una materia! 🐾</div>
        </div>
        <ul class="menu" id="menu"></ul>
      </nav>

      <!-- Contenido principal -->
      <main class="content">
        <!-- Pantalla de bienvenida: mini-juego de explotar globos -->
        <div class="welcome" id="welcome">
          <div class="welcome-header">
            <h1 class="welcome-title">¡Bienvenido a <span>App Kids</span>!</h1>
            <p class="welcome-sub">¡Explota los globos y luego elige tu materia favorita! 🎈</p>
          </div>
          <div class="welcome-game-wrap">
            <canvas id="balloon-canvas" width="640" height="340"></canvas>
            <div class="balloon-hud">
              <span id="balloon-score-label">🎈 Globos: <strong id="balloon-score">0</strong></span>
              <span id="balloon-combo-label"></span>
            </div>
          </div>
          <div class="welcome-subjects">
            <p class="welcome-subjects-hint">O elige una materia directamente:</p>
            <div class="welcome-subject-chips" id="welcome-chips"></div>
          </div>
        </div>
        <div class="game-view" id="game-view" style="display: none">
          <h1 id="game-title"></h1>
          <p id="game-description"></p>
          <div id="game-area" class="game-area"></div>
        </div>
      </main>
    </div>

    <script src="menu-config.js"></script>
    <script src="games.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
