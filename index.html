<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <title>App Kids - Aprende Jugando</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar (items generados dinámicamente desde menu-config.js) -->
      <nav class="sidebar">
        <div class="sidebar-header">
          <h2>App Kids</h2>
        </div>
        <ul class="menu" id="menu"></ul>
      </nav>

      <!-- Contenido principal -->
      <main class="content">
        <div class="welcome" id="welcome">
          <h1>¡Bienvenido!</h1>
          <p>Selecciona una materia y un juego del menú para comenzar a aprender.</p>
          <div class="welcome-icons"><span>📖</span><span>🔢</span><span>🌿</span><span>🌍</span><span>🎨</span></div>
        </div>
        <div class="game-view" id="game-view" style="display: none">
          <h1 id="game-title"></h1>
          <p id="game-description"></p>
          <div id="game-area" class="game-area"></div>
        </div>
      </main>
    </div>

    <script src="menu-config.js"></script>
    <script src="games.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
